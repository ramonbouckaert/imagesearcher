<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 1.5rem;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        #search-input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
            outline: none;
        }

        #search-input:focus {
            border-color: #4a90d9;
        }

        #status {
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 1rem;
            min-height: 1.25rem;
        }

        #image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        #image-grid::after {
            content: '';
            flex: 9999 1 100%;
        }

        .grid-item {
            border-radius: 6px;
            display: block;
            overflow: hidden;
            transition: opacity 0.15s;
        }

        .grid-item:hover { opacity: 0.8; }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
</head>
<body>
    <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search images…" autofocus />
    </div>
    <p id="status"></p>
    <div id="image-grid"></div>
    <div id="scroll-sentinel"></div>
    <script src="client.js"></script>
</body>
</html>
