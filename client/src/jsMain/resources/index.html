<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 1.5rem;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 0.75rem;
        }

        #search-input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
            outline: none;
        }

        #search-input:focus {
            border-color: #4a90d9;
        }

        .tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .tab-btn {
            padding: 0.35rem 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1c1c1c;
            color: #888;
            cursor: pointer;
            font-size: 0.875rem;
            font-family: inherit;
        }

        .tab-btn.active {
            background: #4a90d9;
            color: #fff;
            border-color: #4a90d9;
        }

        #status {
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 1rem;
            min-height: 1.25rem;
        }

        #image-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: space-evenly;
            align-content: stretch;
        }

        #image-grid::after {
            content: '';
            flex: 9999 1 0;
        }

        .grid-item {
            border-radius: 6px;
            display: block;
            overflow: hidden;
            transition: opacity 0.15s;
            opacity: 0;
            flex-grow: 1;
            flex-basis: 220px;
            aspect-ratio: 1;
        }

        .grid-item-untagged {
            outline: 3px solid rgba(220,50,50,0.7);
        }

        .popup-content {
            position: relative;
            display: inline-block;
        }

        .popup-content img {
            width: 15vmin;
            height: 15vmin;
            object-fit: cover;
            display: block;
            border-radius: 5px;
            cursor: pointer;
        }

        .popup-count-badge {
            position: absolute;
            top: 4px;
            right: 4px;
            background: #000;
            color: #fff;
            font-size: 11px;
            font-weight: bold;
            border-radius: 10px;
            padding: 1px 6px;
            pointer-events: none;
        }

        .grid-item:hover { opacity: 0.8; }

        .grid-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        #map-view { display: none; }

        .maplibregl-popup {
            pointer-events: none;
        }

        .maplibregl-popup-content {
            padding: 3px !important;
            border-radius: 6px;
            overflow: hidden;
            pointer-events: none !important;
        }

        #map {
            width: 100%;
            height: calc(100vh - 9rem);
            min-height: 400px;
            border-radius: 6px;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search images…" autofocus />
    </div>
    <div class="tabs">
        <button id="tab-list" class="tab-btn active">List</button>
        <button id="tab-map" class="tab-btn">Map</button>
    </div>
    <div id="list-view">
        <p id="status"></p>
        <div id="image-grid"></div>
        <div id="scroll-sentinel"></div>
    </div>
    <div id="map-view">
        <div id="map"></div>
    </div>
    <script src="client.js"></script>
</body>
</html>
