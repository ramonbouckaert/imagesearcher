<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Search</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: system-ui, sans-serif;
            background: #0f0f0f;
            color: #e0e0e0;
            padding: 1.5rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            color: #fff;
        }

        .search-bar {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        #search-input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 1rem;
            border-radius: 6px;
            border: 1px solid #333;
            background: #1c1c1c;
            color: #e0e0e0;
            outline: none;
        }

        #search-input:focus {
            border-color: #4a90d9;
        }

        #search-button {
            padding: 0.6rem 1.4rem;
            font-size: 1rem;
            border-radius: 6px;
            border: none;
            background: #4a90d9;
            color: #fff;
            cursor: pointer;
            font-weight: 500;
        }

        #search-button:hover { background: #357abd; }
        #search-button:active { background: #2a6299; }

        #status {
            font-size: 0.875rem;
            color: #888;
            margin-bottom: 1rem;
            min-height: 1.25rem;
        }

        #image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 0.5rem;
        }

        .grid-item {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            border-radius: 6px;
            display: block;
            transition: opacity 0.15s;
        }

        .grid-item:hover { opacity: 0.8; }
    </style>
</head>
<body>
    <h1>Image Search</h1>
    <div class="search-bar">
        <input id="search-input" type="text" placeholder="Search images…" autofocus />
        <button id="search-button">Search</button>
    </div>
    <p id="status"></p>
    <div id="image-grid"></div>
    <div id="scroll-sentinel"></div>
    <script src="client.js"></script>
</body>
</html>
